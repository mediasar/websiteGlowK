<html>
    <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: #fff6f9;
      color: #333;
      line-height: 1.6;
    }
    header {
      background: #fff;
      padding: 20px 40px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: #d81b60;
    }
    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #444;
      font-weight: 500;
    }
    nav a:hover {
      color: #d81b60;
    }
    .hero {
      background: linear-gradient(to right, #ffe4ec, #fff0f5);
      padding: 80px 40px;
      text-align: center;
    }
    .hero h2 {
      font-size: 36px;
      color: #d81b60;
      margin-bottom: 20px;
    }
    .hero p {
      font-size: 18px;
      max-width: 600px;
      margin: auto;
      color: #555;
    }
    .cta {
      margin-top: 30px;
    }
    .cta a {
      background: #d81b60;
      color: #fff;
      padding: 12px 24px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.3s ease;
    }
    .cta a:hover {
      background: #b7154e;
    }
    .products {
      padding: 60px 40px;
      background: #fff;
    }
    .products h3 {
      text-align: center;
      font-size: 28px;
      color: #d81b60;
      margin-bottom: 40px;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
    }
    .product-card {
      background: #fff0f7;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
      transition: transform 0.3s ease;
    }
    .product-card:hover {
      transform: translateY(-5px);
    }
    .product-card img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      margin-bottom: 15px;
    }
    .product-card h4 {
      font-size: 18px;
      margin-bottom: 10px;
      color: #d81b60;
    }
    .product-card p {
      font-size: 14px;
      color: #555;
    }
    .about, .contact, .newsletter {
      padding: 60px 40px;
      background: #fff6f9;
    }
    .about h3, .contact h3, .newsletter h3 {
      text-align: center;
      font-size: 26px;
      color: #d81b60;
      margin-bottom: 30px;
    }
    .about p, .contact p {
      max-width: 700px;
      margin: auto;
      font-size: 16px;
      color: #555;
      text-align: center;
    }
    .contact form, .newsletter form {
      max-width: 500px;
      margin: 30px auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    input, textarea {
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
    }
    button {
      padding: 12px;
      border: none;
      background: #d81b60;
      color: #fff;
      font-weight: bold;
      border-radius: 30px;
      cursor: pointer;
    }
    button:hover {
      background: #b7154e;
    }
    footer {
      text-align: center;
      padding: 30px 20px;
      background: #fff0f7;
      color: #777;
      font-size: 14px;
    }
  </style>
</head>

 <section class="contact" id="kontak">
    <h3>Hubungi Kami</h3>
    <p>Ingin bertanya tentang produk atau menjadi reseller? Kirim pesan melalui formulir di bawah ini:</p>
    <form>
      <input type="text" placeholder="Nama Anda" required>
      <input type="email" placeholder="Email Anda" required>
      <textarea rows="4" placeholder="Pesan Anda" required></textarea>
      <button type="submit">Kirim</button>
    </form>
  </section>
  <footer>
    &copy; 2025 GlowK. Dirancang dengan cinta untuk kecantikan alami.
  </footer>
</html>
